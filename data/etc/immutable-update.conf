# /etc/immutable-update.conf
# Configuration for the immutable root update system

# ── Post-update scripts ───────────────────────────────────────────
# Git repositories to clone and run after apt upgrades.
# Each repo must contain an executable ./install.sh at its root.
# Repos are processed in order. Each is cloned into a temp directory,
# ./install.sh is run, and the clone is removed afterward.
#
# Example:
#   REPOS=(
#       "https://github.com/example/desktop-config.git"
#       "https://github.com/example/security-hardening.git"
#   )
REPOS=(
)

# ── BTRFS layout ─────────────────────────────────────────────────
# Subvolume names (relative to btrfs top-level)
ROOT_SUBVOL="@"
SNAPSHOTS_DIR="@snapshots"
ROOTFS_SUBVOL="@rootfs"
STAGING_SUBVOL="@staging"

# ── Snapshot retention ───────────────────────────────────────────
# Maximum number of read-only snapshots to keep (0 = unlimited)
MAX_SNAPSHOTS=10

# ── Boot partitions (bind-mounted into nspawn) ──────────────────
BOOT_PARTITION="/boot"
EFI_PARTITION="/boot/efi"

# ── Logging ──────────────────────────────────────────────────────
LOG_DIR="/var/log/immutable-update"
