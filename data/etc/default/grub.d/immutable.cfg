# /etc/default/grub.d/immutable.cfg
#
# GRUB configuration for the immutable desktop boot model.
# This is sourced by /etc/default/grub via the grub.d mechanism.

# Use the immutable entry (06_immutable) as the default, not the stock
# Ubuntu entry from 10_linux. The "0" here means "first entry in the menu",
# which will be our "clean" snapshot boot.
GRUB_DEFAULT=0

# Show the menu for 10 seconds so the user can choose tainted boot.
# Set to 0 for instant clean boot (hold SHIFT to see menu).
GRUB_TIMEOUT=10
GRUB_TIMEOUT_STYLE=menu

# Base kernel command line — crypto and root flags are added by 06_immutable.
# Keep this minimal; per-entry customization happens in the script.
GRUB_CMDLINE_LINUX=""

# Disable os-prober — we don't want Windows or other OS entries cluttering
# the menu. Re-enable if dual-booting.
GRUB_DISABLE_OS_PROBER=true
