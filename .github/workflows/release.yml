name: Release

on:
  push:
    tags: ["v*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck scripts
        run: |
          shellcheck -s bash \
            data/usr/sbin/immutable-update \
            data/usr/sbin/immutable-ubuntu-setup \
            data/usr/lib/dracut/modules.d/90immutable-ubuntu/module-setup.sh \
            data/usr/lib/dracut/modules.d/90immutable-ubuntu/immutable-ubuntu-setup.sh \
            data/usr/lib/dracut/modules.d/90immutable-ubuntu/immutable-ubuntu-generator \
            data/etc/grub.d/06_immutable

  build:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.version.outputs.prerelease }}
    container:
      image: ubuntu:noble

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential dpkg-dev debhelper devscripts git

      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            DEB_VERSION="${TAG}-1"
            PRERELEASE="false"
          else
            DEB_VERSION="$(echo "$TAG" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)-(.+)\.([0-9]+)/\1~\2\3/')-1"
            PRERELEASE="true"
          fi
          echo "deb_version=${DEB_VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Version: ${DEB_VERSION} (prerelease=${PRERELEASE})"

      - name: Stamp debian/changelog with tag version
        run: |
          DEBFULLNAME="GitHub Actions" \
          DEBEMAIL="actions@github.com" \
          dch --newversion "${{ steps.version.outputs.deb_version }}" \
              --distribution noble \
              "Release ${GITHUB_REF#refs/tags/}"

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ../*.deb ../*.buildinfo ../*.changes artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immutable-ubuntu
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.deb
          generate_release_notes: true
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
